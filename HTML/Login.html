<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema ICA</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- Fondo con overlay -->
<div class="bg-image d-flex justify-content-center align-items-center">

  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
    
    <h3 class="text-center mb-4">Sistema de Inspección ICA</h3>
    
    <form>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" placeholder="Ingrese su correo">
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" placeholder="Ingrese su contraseña">
      </div>

      <div class="mb-3">
        <label class="form-label">Rol</label>
        <select class="form-select">
          <option>Administrador</option>
          <option>Productor</option>
          <option>Técnico</option>
        
        </select>
      </div>

      <button type="button" onclick="redirigir()" class="btn btn-success w-100">
        Iniciar Sesión
      </button>
    </form>

  </div>

</div>

<style>
body, html {
    height: 100%;
    margin: 0;
}

.bg-image {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('fondo.jpg');
    background-size: cover;
    background-position: center;
    height: 100vh;
}
</style>

<script>
function redirigir() {
    var rol = document.querySelector("select").value;

    if (rol === "Administrador") {
        window.location.href = "dashboard_admin.html";
    } 
    else if (rol === "Técnico"){
        window.location.href = "dashboard-tecnico.html";
    }
    else if (rol === "Productor"){
        window.location.href = "dashboard-productor.html";
    }
}
</script>

</body>
</html>
